app:
  name: WeaveVision
  organization_name: null
  environment: local
  language: tr
  max_upload_mb: 200
  telemetry: false
paths:
  data_root: data
  artifacts_root: artifacts
  database: artifacts/weavevision.sqlite3
runtime:
  device: auto
  precision: auto
  num_workers: 4
  deterministic: true
  seed: 42
inference:
  quality_gate_enabled: true
  tiling_enabled: true
  tile_size: [512, 512]
  tile_overlap: 0.25
  min_component_area_px: 16
  heatmap_alpha: 0.45
reporting:
  save_original_copy: false
  save_heatmap: true
  save_mask: true
  save_overlay: true
# ---------------------------------------------------------------------------
# Drift monitoring & alert policy (M3)
# All values are INITIAL POLICIES.
# Calibrate against operational-validation data ONLY -- never against test set.
# ---------------------------------------------------------------------------
drift:
  # EWMA / CUSUM parameters (see evaluation/trend_monitor.py)
  ewma_lambda: 0.25
  ewma_limit_sigma: 3.0
  cusum_k_sigma: 0.25
  cusum_h_sigma: 4.0
  # PSI thresholds (see evaluation/psi.py)
  psi_medium_threshold: 0.10
  psi_high_threshold: 0.25
  # Incident triage: min independent signals before retraining request
  retraining_min_confirming_signals: 2
  # Sudden-drop classification (same unit as monitored metric)
  sudden_drop_review_pp: 2.0
  sudden_drop_incident_pp: 5.0
  sudden_drop_block_pp: 10.0
  # Canary evaluation thresholds (M7)
  # challenger is rejected when disagreement_rate > max OR recall_delta < min
  canary_max_disagreement_rate: 0.05
  canary_min_recall_delta: -0.02

