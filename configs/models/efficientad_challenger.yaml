# RTX 4070 Laptop GPU (8GB VRAM) — EfficientAD small ayarları
model:
  name: efficient_ad
  imagenet_dir: data/external/imagenette
  model_size: small
  teacher_out_channels: 384
  padding: false
trainer:
  max_epochs: 100
  precision: bf16-mixed  # Ada Lovelace bfloat16 native
data:
  train_batch_size: 1   # EfficientAD memory-heavy, 1'den başla
  eval_batch_size: 1
seed: 42
